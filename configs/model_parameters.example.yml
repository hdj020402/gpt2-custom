### General ###
mode: training   # training / hpo / generation
jobtype: ...
seed: 42

### Dataset ###
train_file: null
val_file: null
test_file: null
target: 'moltxt'
corpus_file: null
custom_tokens_file: null
custom_tokenize: null   # Path to .py defining custom tokenize function (changes invalidate cache)
custom_metrics: null    # Path to .py defining compute_metrics/preprocess_logits (no cache impact)
vocab_size: 1000
tk_num_proc: 4
per_device_train_batch_size: 32
dataloader_num_workers: 4

# ── Distributed training ─────────────────────────────────────────────────────
# All config below stays the same for single-GPU and multi-GPU.  The framework
# auto-detects multi-GPU mode via environment variables set by ``torchrun``.
#
# Launch examples:
#   Single GPU:
#     python main.py
#
#   Single node, 4 GPUs:
#     torchrun --nproc_per_node=4 main.py
#
#   Multi-node (2 nodes, 4 GPUs each):
#     # Node 0 (master):
#     torchrun --nproc_per_node=4 --nnodes=2 --node_rank=0 \
#         --master_addr=<ip> --master_port=29500 main.py
#     # Node 1:
#     torchrun --nproc_per_node=4 --nnodes=2 --node_rank=1 \
#         --master_addr=<ip> --master_port=29500 main.py
#
# When scaling to more GPUs, consider adjusting:
#   - per_device_train_batch_size (per GPU, keep same or reduce to maintain
#     total global batch size)
#   - gradient_accumulation_steps
#   - learning_rate (linear scaling rule: multiply by world_size if doubling
#     global batch size)
# ──────────────────────────────────────────────────────────────────────────────

### Model ###
n_ctx: 1024
n_embd: 768
n_head: 12
n_layer: 12
n_positions: 1024
dropout: 0.1

### Training ###
resume_from_checkpoint: null   # Path to checkpoint dir (e.g. ./output/checkpoint-1000) to resume training
gradient_accumulation_steps: 1
num_train_epochs: 30
learning_rate: 0.0001
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03   # Fraction of total steps for LR warmup; auto-converted to warmup_steps
# warmup_steps: 650  # Set directly to override auto-calculation from warmup_ratio
eval_steps: 1000
model_save_steps: 1000
save_total_limit: 3
logging_steps: 1000
early_stopping:
  patience: 20
  threshold: 0

### Generation ###
device: cuda
pretrained_model: null
start_token: '<Energy:>'
stop_token: '</ei1a>'
temperature: 0.0
max_tokens: 100


