# ============================================================================
# HPO Hyperparameter Search Configuration
# ============================================================================
# Notes:
#   - Use ``warmup_steps`` instead of the deprecated ``warmup_ratio``.
#   - Do NOT include ``per_device_train_batch_size`` or
#     ``gradient_accumulation_steps`` — they are resource constraints (GPU
#     memory), not hyperparameters.  Set them to the maximum your GPU can
#     handle in ``model_parameters.yml``.
#   - When ``sampler.type`` is GridSampler, every hyperparameter MUST use
#     ``type: categorical`` with an explicit ``choices`` list.
#   - See ``docs/hpo.md`` for the full sampler / pruner reference.
# ============================================================================

### General ###
optuna:
  sampler:
    type: TPESampler   # GridSampler / RandomSampler / TPESampler ...
    seed: 42
  pruner:
    type: MedianPruner   # HyperbandPruner / ThresholdPruner / MedianPruner ...
    n_warmup_steps: 20
  direction: minimize
  n_trials: 100
  continue_trials:
    continue: False
    storage: null
    study_name: null

### Training ###
learning_rate:
  type: loguniform
  low: 0.0001
  high: 0.01
weight_decay:
  type: loguniform
  low: 0.01
  high: 0.1
max_grad_norm:
  type: float
  low: 0.1
  high: 5.0
warmup_steps:
  type: int
  low: 100
  high: 2000
  step: 100
adam_beta1:
  type: uniform
  low: 0.85
  high: 0.95
adam_beta2:
  type: uniform
  low: 0.90
  high: 0.999
adam_epsilon:
  type: loguniform
  low: 1e-9
  high: 1e-6
lr_scheduler_type:
  type: categorical
  choices: [cosine, linear, constant_with_warmup]
